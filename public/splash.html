<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MES UOL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f57c00; /* Your theme orange */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', 'Roboto', sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        /* Logo wrapper – rolls in from right */
        .logo-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            animation: rollIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .gear-logo {
            width: 40vw;
            max-width: 200px;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.2));
        }

        /* Text container – each line fades in sequentially */
        .text-container {
            text-align: center;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.3;
        }

        .text-line {
            font-size: clamp(2rem, 12vw, 3.5rem);
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        .line1 { animation-delay: 0.8s; }
        .line2 { animation-delay: 1.1s; }
        .line3 { animation-delay: 1.4s; }

        /* Keyframe: roll in from right */
        @keyframes rollIn {
            0% {
                transform: translateX(150%) rotate(360deg);
                opacity: 0;
            }
            60% {
                transform: translateX(-5%) rotate(-10deg);
                opacity: 1;
            }
            80% {
                transform: translateX(2%) rotate(5deg);
            }
            100% {
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
        }

        /* Keyframe: fade in and slide up slightly */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments */
        @media (min-width: 768px) {
            .gear-logo {
                max-width: 240px;
            }
        }

        @media (max-width: 480px) {
            .text-line {
                letter-spacing: 2px;
            }
        }

        /* Optional: subtle pulse on the logo after it settles */
        .logo-wrapper {
            animation: rollIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards,
                       pulse 2s ease-in-out 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <img src="/mes-society/assets/images/logo-mes.png" alt="MES Logo" class="gear-logo">
        </div>
        <div class="text-container">
            <div class="text-line line1">Mechanical</div>
            <div class="text-line line2">Engineering</div>
            <div class="text-line line3">Society</div>
        </div>
    </div>

    <script>
        (function() {
            // Total animation time: rollIn (1.2s) + text delays (1.4s + 0.5s each) ≈ 3 seconds
            // We'll redirect after 3.5 seconds to be safe
            const REDIRECT_DELAY = 3500;

            setTimeout(() => {
                const onboardingComplete = localStorage.getItem('onboarding_complete');
                if (onboardingComplete === 'true') {
                    window.location.replace('/mes-society/member/dashboard.php');
                } else {
                    window.location.replace('/mes-society/public/onboarding.php');
                }
            }, REDIRECT_DELAY);

            // Preload the dashboard/onboarding page for faster transition (optional)
            const preloadLink = document.createElement('link');
            preloadLink.rel = 'prefetch';
            preloadLink.href = localStorage.getItem('onboarding_complete') === 'true' 
                ? '/mes-society/member/dashboard.php' 
                : '/mes-society/public/onboarding.php';
            document.head.appendChild(preloadLink);
        })();
    </script>
</body>
</html>
